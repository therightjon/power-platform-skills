name: Bug Report
description: Report a bug in a Power Platform Skills plugin
labels: ["bug"]
body:
  - type: dropdown
    id: plugin
    attributes:
      label: Plugin
      description: Which plugin is this bug related to?
      options:
        - canvas-apps
        - code-apps
        - model-apps
        - power-automate
        - power-pages
    validations:
      required: true

  - type: input
    id: plugin-version
    attributes:
      label: Plugin Version
      description: What version of the plugin are you using?
      placeholder: e.g., 1.0.0
    validations:
      required: true

  - type: input
    id: skill
    attributes:
      label: Skill / Command
      description: Which skill or command were you using? (e.g., deploy-site, integrate-webapi)
      placeholder: e.g., deploy-site
    validations:
      required: false

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of the bug.
      placeholder: Describe what happened...
    validations:
      required: true

  - type: textarea
    id: repro-steps
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Run skill '...'
        2. Provide input '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs / Screenshots
      description: Paste any relevant log output or screenshots.
      render: shell
    validations:
      required: false

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Any relevant environment details.
      placeholder: |
        - OS: Windows 11
        - Claude Code version: x.x.x
        - PAC CLI version: x.x.x
    validations:
      required: false
